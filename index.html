<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fortune Wheel Randomizer</title>
  <meta name="description"
    content="A beautiful animated Fortune Wheel Randomizer — enter your values, spin the wheel, and let fate decide!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg-primary: #0a0a1a;
      --bg-secondary: #12122a;
      --bg-card: rgba(255, 255, 255, 0.04);
      --border-subtle: rgba(255, 255, 255, 0.08);
      --text-primary: #f0f0f8;
      --text-secondary: #9898b8;
      --accent-1: #7c5cfc;
      --accent-2: #c84cfa;
      --accent-3: #fc5c7c;
      --glow: rgba(124, 92, 252, 0.35);
      --radius: 16px;
      --transition: 0.3s cubic-bezier(.4, 0, .2, 1);
    }

    html {
      font-size: 16px;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Animated background blobs */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      z-index: 0;
      pointer-events: none;
      animation: blobDrift 18s ease-in-out infinite alternate;
    }

    body::before {
      width: 600px;
      height: 600px;
      background: var(--accent-1);
      top: -120px;
      left: -100px;
    }

    body::after {
      width: 500px;
      height: 500px;
      background: var(--accent-2);
      bottom: -80px;
      right: -80px;
      animation-delay: -9s;
    }

    @keyframes blobDrift {
      0% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(60px, 40px) scale(1.12);
      }

      100% {
        transform: translate(-30px, 70px) scale(0.95);
      }
    }

    /* Layout */
    .app {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    /* Header */
    .header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .header h1 {
      font-size: clamp(1.75rem, 5vw, 2.75rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.15;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 0.95rem;
      max-width: 420px;
    }

    /* Main content grid */
    .content {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 2.5rem;
      width: 100%;
      align-items: start;
    }

    /* Glass card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 1.5rem;
    }

    /* Sidebar — Input area */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .sidebar label {
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
    }

    .sidebar textarea {
      width: 100%;
      min-height: 180px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-subtle);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.95rem;
      padding: 0.85rem 1rem;
      resize: vertical;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
      line-height: 1.6;
    }

    .sidebar textarea::placeholder {
      color: rgba(152, 152, 184, 0.5);
    }

    .sidebar textarea:focus {
      border-color: var(--accent-1);
      box-shadow: 0 0 0 3px var(--glow);
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 0.6rem;
    }

    .btn {
      flex: 1;
      padding: 0.7rem 1rem;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
      position: relative;
      overflow: hidden;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      color: #fff;
      box-shadow: 0 4px 20px var(--glow);
    }

    .btn-primary:hover {
      box-shadow: 0 6px 28px var(--glow);
    }

    .btn-outline {
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
    }

    .btn-outline:hover {
      border-color: rgba(255, 255, 255, 0.2);
      color: var(--text-primary);
    }

    /* Wheel area */
    .wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.75rem;
    }

    .wheel-wrapper {
      position: relative;
      width: min(420px, 90vw);
      height: min(420px, 90vw);
    }

    /* Pointer / ticker */
    .pointer {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      width: 0;
      height: 0;
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-top: 36px solid var(--accent-3);
      filter: drop-shadow(0 4px 12px rgba(252, 92, 124, 0.5));
      transition: filter 0.2s;
    }

    canvas#wheelCanvas {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow:
        0 0 0 6px rgba(255, 255, 255, 0.06),
        0 0 60px rgba(124, 92, 252, 0.18),
        inset 0 0 40px rgba(0, 0, 0, 0.25);
      cursor: pointer;
      transition: box-shadow var(--transition);
    }

    canvas#wheelCanvas.spinning {
      box-shadow:
        0 0 0 6px rgba(255, 255, 255, 0.1),
        0 0 80px rgba(200, 76, 250, 0.35),
        inset 0 0 40px rgba(0, 0, 0, 0.25);
    }

    /* Center hub */
    .hub {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 54px;
      height: 54px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: linear-gradient(145deg, #1e1e3a, #0e0e20);
      border: 3px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 5;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }

    .hub::after {
      content: '✦';
      font-size: 1.1rem;
      color: var(--accent-2);
      opacity: 0.8;
    }

    /* Spin button */
    .btn-spin {
      padding: 0.9rem 3rem;
      border: none;
      border-radius: 50px;
      font-family: inherit;
      font-weight: 800;
      font-size: 1.05rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2), var(--accent-3));
      background-size: 200% 200%;
      animation: gradShift 4s ease infinite;
      color: #fff;
      box-shadow: 0 6px 30px var(--glow);
      transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
      position: relative;
      overflow: hidden;
    }

    .btn-spin::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 200%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      transition: left 0.6s;
    }

    .btn-spin:hover::before {
      left: 100%;
    }

    .btn-spin:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 40px var(--glow);
    }

    .btn-spin:active {
      transform: scale(0.95);
    }

    .btn-spin:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none;
    }

    @keyframes gradShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    /* Result display */
    .result-container {
      width: 100%;
      max-width: 420px;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      opacity: 0;
      transform: translateY(12px) scale(0.95);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .result-container.visible {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .result-text {
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      padding: 0.75rem 1.5rem;
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      background-color: var(--bg-card);
      /* need to separate gradient text from bg */
    }

    .result-text {
      position: relative;
      color: transparent;
      z-index: 1;
    }

    .result-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 60px;
      background: rgba(124, 92, 252, 0.12);
      border: 1px solid rgba(124, 92, 252, 0.25);
      backdrop-filter: blur(12px);
    }

    .result-badge .label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
    }

    .result-badge .value {
      font-size: 1.2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* History section */
    .history {
      width: 100%;
      max-width: 420px;
    }

    .history-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-secondary);
      margin-bottom: 0.6rem;
    }

    .history-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .history-item {
      padding: 0.35rem 0.85rem;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.85);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 3rem 1rem;
      text-align: center;
    }

    .empty-state .icon {
      font-size: 3rem;
      opacity: 0.3;
    }

    .empty-state p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      max-width: 260px;
      line-height: 1.5;
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      z-index: 100;
      pointer-events: none;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0% {
        opacity: 1;
        transform: translateY(0) rotate(0deg);
      }

      100% {
        opacity: 0;
        transform: translateY(100vh) rotate(720deg);
      }
    }

    /* Responsive */
    @media (max-width: 800px) {
      .content {
        grid-template-columns: 1fr;
        gap: 1.75rem;
      }

      .sidebar {
        order: 2;
      }

      .wheel-section {
        order: 1;
      }

      .wheel-wrapper {
        width: min(340px, 85vw);
        height: min(340px, 85vw);
      }
    }

    @media (max-width: 480px) {
      .app {
        padding: 1.25rem 1rem 3rem;
        gap: 1.75rem;
      }

      .wheel-wrapper {
        width: min(290px, 88vw);
        height: min(290px, 88vw);
      }

      .btn-spin {
        padding: 0.8rem 2.25rem;
        font-size: 0.95rem;
      }
    }

    /* Screen-reader only */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }
  </style>
</head>

<body>
  <div class="app" role="main">

    <!-- Header -->
    <header class="header">
      <h1>Fortune Wheel</h1>
      <p>Enter your options, spin the wheel, and let fate decide.</p>
    </header>

    <!-- Main content -->
    <div class="content">

      <!-- Sidebar: Input -->
      <aside class="sidebar card" id="inputPanel">
        <label for="valuesInput">Your Options</label>
        <textarea id="valuesInput" placeholder="Enter your value. Each value in new line" spellcheck="false"
          aria-label="Enter wheel options, one per line or separated by commas"></textarea>
        <div class="btn-group">
          <button class="btn btn-primary" id="btnGenerate" type="button">Generate Wheel</button>
          <button class="btn btn-outline" id="btnClear" type="button">Clear</button>
        </div>
      </aside>

      <!-- Wheel -->
      <section class="wheel-section" aria-label="Fortune Wheel">

        <div class="wheel-wrapper" id="wheelWrapper" style="display:none;">
          <div class="pointer" id="pointer"></div>
          <canvas id="wheelCanvas" width="840" height="840"></canvas>
          <div class="hub"></div>
        </div>

        <div class="empty-state" id="emptyState">
          <div class="icon">🎡</div>
          <p>Add at least 2 options and click <strong>Generate Wheel</strong> to get started.</p>
        </div>

        <button class="btn-spin" id="btnSpin" type="button" disabled>
          🎲&ensp;Spin the Wheel
        </button>

        <div class="result-container" id="resultContainer">
          <div class="result-badge">
            <span class="label">Result</span>
            <span class="value" id="resultValue">—</span>
          </div>
        </div>

        <div class="history" id="historySection" style="display:none;">
          <div class="history-title">History</div>
          <div class="history-list" id="historyList"></div>
        </div>

      </section>
    </div>
  </div>

  <script>
    (() => {
      'use strict';

      /* ───── DOM refs ───── */
      const textarea = document.getElementById('valuesInput');
      const btnGenerate = document.getElementById('btnGenerate');
      const btnClear = document.getElementById('btnClear');
      const btnSpin = document.getElementById('btnSpin');
      const canvas = document.getElementById('wheelCanvas');
      const ctx = canvas.getContext('2d');
      const wheelWrapper = document.getElementById('wheelWrapper');
      const emptyState = document.getElementById('emptyState');
      const resultContainer = document.getElementById('resultContainer');
      const resultValue = document.getElementById('resultValue');
      const historySection = document.getElementById('historySection');
      const historyList = document.getElementById('historyList');
      const pointer = document.getElementById('pointer');

      /* ───── State ───── */
      let segments = [];
      let angle = 0;       // current rotation in radians
      let spinning = false;
      let history = [];
      let animId = null;

      /* ───── Curated color palette ───── */
      const PALETTE = [
        '#7c5cfc', '#c84cfa', '#fc5c7c', '#fcb45c',
        '#5cccfc', '#5cfc8c', '#f05cfc', '#fc5ca8',
        '#6c8cfc', '#40d8b0', '#e85cbc', '#fca05c',
        '#5cacfc', '#b45cfc', '#fc6c5c', '#5cfccc',
        '#9c5cfc', '#fc845c', '#5ce8fc', '#dc5cfc',
      ];

      function getColor(i) {
        return PALETTE[i % PALETTE.length];
      }

      /* ───── Parse input ───── */
      function parseInput(raw) {
        // Split by newlines and/or commas
        return raw
          .split(/[\n,]+/)
          .map(s => s.trim())
          .filter(s => s.length > 0);
      }

      /* ───── Draw the wheel ───── */
      function drawWheel() {
        const w = canvas.width;
        const h = canvas.height;
        const cx = w / 2;
        const cy = h / 2;
        const r = cx - 8;
        const n = segments.length;
        if (n === 0) return;

        ctx.clearRect(0, 0, w, h);
        const sliceAngle = (2 * Math.PI) / n;

        for (let i = 0; i < n; i++) {
          const startA = angle + i * sliceAngle;
          const endA = startA + sliceAngle;

          // Slice
          ctx.beginPath();
          ctx.moveTo(cx, cy);
          ctx.arc(cx, cy, r, startA, endA);
          ctx.closePath();
          ctx.fillStyle = getColor(i);
          ctx.fill();

          // Subtle border between slices
          ctx.strokeStyle = 'rgba(0,0,0,0.2)';
          ctx.lineWidth = 2;
          ctx.stroke();

          // Label
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(startA + sliceAngle / 2);
          ctx.textAlign = 'right';
          ctx.fillStyle = '#fff';
          ctx.shadowColor = 'rgba(0,0,0,0.5)';
          ctx.shadowBlur = 4;

          // Dynamic font size
          const maxLen = 14;
          let label = segments[i];
          if (label.length > maxLen) label = label.slice(0, maxLen - 1) + '…';
          const fontSize = Math.max(14, Math.min(22, (r * 0.1) - n * 0.3));
          ctx.font = `700 ${fontSize}px 'Inter', sans-serif`;
          ctx.fillText(label, r - 24, fontSize * 0.35);

          ctx.restore();
        }

        // Outer ring
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, 2 * Math.PI);
        ctx.strokeStyle = 'rgba(255,255,255,0.08)';
        ctx.lineWidth = 6;
        ctx.stroke();

        // Tick marks
        for (let i = 0; i < n; i++) {
          const a = angle + i * sliceAngle;
          ctx.beginPath();
          ctx.moveTo(cx + Math.cos(a) * (r - 10), cy + Math.sin(a) * (r - 10));
          ctx.lineTo(cx + Math.cos(a) * (r + 2), cy + Math.sin(a) * (r + 2));
          ctx.strokeStyle = 'rgba(255,255,255,0.25)';
          ctx.lineWidth = 3;
          ctx.stroke();
        }
      }

      /* ───── Generate wheel ───── */
      function generate() {
        const parsed = parseInput(textarea.value);
        if (parsed.length < 2) {
          textarea.focus();
          textarea.style.borderColor = 'var(--accent-3)';
          setTimeout(() => textarea.style.borderColor = '', 800);
          return;
        }
        segments = parsed;
        angle = 0;
        wheelWrapper.style.display = 'block';
        emptyState.style.display = 'none';
        btnSpin.disabled = false;
        resultContainer.classList.remove('visible');
        drawWheel();
      }

      /* ───── Clear ───── */
      function clearAll() {
        textarea.value = '';
        segments = [];
        angle = 0;
        spinning = false;
        history = [];
        if (animId) cancelAnimationFrame(animId);
        animId = null;
        wheelWrapper.style.display = 'none';
        emptyState.style.display = '';
        btnSpin.disabled = true;
        resultContainer.classList.remove('visible');
        historySection.style.display = 'none';
        historyList.innerHTML = '';
        canvas.classList.remove('spinning');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        textarea.focus();
      }

      /* ───── Spin ───── */
      function spin() {
        if (spinning || segments.length < 2) return;
        spinning = true;
        btnSpin.disabled = true;
        canvas.classList.add('spinning');
        resultContainer.classList.remove('visible');

        // Random target
        const totalRotation = (Math.random() * 4 + 6) * 2 * Math.PI; // 6-10 full rotations
        const start = angle;
        const end = start + totalRotation;
        const duration = 5000 + Math.random() * 1500; // 5-6.5s
        const startTime = performance.now();

        // Tick sound via oscillator (optional, tiny)
        let audioCtx;
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { }

        function tick() {
          if (!audioCtx) return;
          try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'sine';
            osc.frequency.value = 1200 + Math.random() * 400;
            gain.gain.value = 0.04;
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.06);
          } catch (e) { }
        }

        let lastTickSegment = -1;

        function easeOutQuart(t) {
          return 1 - Math.pow(1 - t, 4);
        }

        function frame(now) {
          const elapsed = now - startTime;
          const t = Math.min(elapsed / duration, 1);
          const eased = easeOutQuart(t);
          angle = start + totalRotation * eased;

          drawWheel();

          // Tick sound when crossing segment boundary
          const sliceAngle = (2 * Math.PI) / segments.length;
          const normAngle = ((angle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
          const currentSeg = Math.floor(normAngle / sliceAngle);
          if (currentSeg !== lastTickSegment) {
            lastTickSegment = currentSeg;
            tick();
            // Pointer bounce
            pointer.style.filter = 'drop-shadow(0 4px 16px rgba(252,92,124,0.8))';
            setTimeout(() => pointer.style.filter = '', 80);
          }

          if (t < 1) {
            animId = requestAnimationFrame(frame);
          } else {
            finishSpin();
          }
        }

        function finishSpin() {
          spinning = false;
          btnSpin.disabled = false;
          canvas.classList.remove('spinning');

          // Determine winner: pointer is at the top (–π/2)
          const sliceAngle = (2 * Math.PI) / segments.length;
          const pointerAngle = -Math.PI / 2; // top
          let normAngle = ((pointerAngle - angle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
          const winIndex = Math.floor(normAngle / sliceAngle);
          const winner = segments[winIndex];

          // Show result
          resultValue.textContent = winner;
          resultContainer.classList.add('visible');

          // Add to history
          history.unshift(winner);
          // if (history.length > 20) history.pop();
          // renderHistory();

          // Confetti!
          launchConfetti();

          if (audioCtx) {
            try { audioCtx.close(); } catch (e) { }
          }
        }

        animId = requestAnimationFrame(frame);
      }

      /* ───── History ───── */
      function renderHistory() {
        historySection.style.display = '';
        historyList.innerHTML = '';
        history.forEach((h, i) => {
          const el = document.createElement('span');
          el.className = 'history-item';
          el.textContent = h;
          if (i === 0) {
            el.style.background = 'rgba(124,92,252,0.15)';
            el.style.borderColor = 'rgba(124,92,252,0.3)';
            el.style.color = '#c8b8ff';
          }
          historyList.appendChild(el);
        });
      }

      /* ───── Confetti ───── */
      function launchConfetti() {
        const colors = ['#7c5cfc', '#c84cfa', '#fc5c7c', '#fcb45c', '#5cccfc', '#5cfc8c', '#fca05c'];
        for (let i = 0; i < 60; i++) {
          const el = document.createElement('div');
          el.className = 'confetti-piece';
          el.style.left = Math.random() * 100 + 'vw';
          el.style.top = '-10px';
          el.style.width = (Math.random() * 8 + 4) + 'px';
          el.style.height = (Math.random() * 14 + 6) + 'px';
          el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
          el.style.animationDuration = (Math.random() * 2 + 2) + 's';
          el.style.animationDelay = (Math.random() * 0.6) + 's';
          el.style.opacity = (Math.random() * 0.5 + 0.5);
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 4000);
        }
      }

      /* ───── Event listeners ───── */
      btnGenerate.addEventListener('click', generate);
      btnClear.addEventListener('click', clearAll);
      btnSpin.addEventListener('click', spin);

      // Also allow Enter in textarea with Ctrl/Cmd
      textarea.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
          e.preventDefault();
          generate();
        }
      });

      // Click canvas to spin
      canvas.addEventListener('click', () => {
        if (!spinning && segments.length >= 2) spin();
      });

      // Pre-populate with example to delight
      textarea.value = '';
      generate();

    })();
  </script>
</body>

</html>
